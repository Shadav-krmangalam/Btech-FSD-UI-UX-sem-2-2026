<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async/Await</title>
</head>
<body>
    <script>
        
        let cart = ["laptop","mobile","earphone"]
        function createOrder(cart){
            console.log("Creating Order....")
            return new Promise((resolve,reject)=>{
             setTimeout(()=>{
                   if(cart.length>0){
                    resolve({
                        orderID:12345,
                        amount:50000
                    })
                }else{
                    reject("Cart is Empty")
                }
             },5000)
            })

        }


        function makePayment(order){
            console.log("Initializing PAyment")
            return new Promise((resolve,reject)=>{
                let network = true;

                setTimeout(()=>{
                    if(network){
                        resolve({
                            ...order,
                            paymentID:"PAY123"
                        })
                    }else{
                        reject("Payment Failed")
                    }

                },5000)
            })
        }


        function updateInventory(order){
            console.log("Updating Inventory")
            return new Promise((resolve,reject)=>{
                let inventoryAvailable =true;
                setTimeout(()=>{
                    if(inventoryAvailable){
                        resolve({
                            ...order,
                            inventoryUpdated:true
                        
                        })
                    }else{
                        reject("inventory not updated")
                    }

                },5000)
            })
        }

        function orderStatus(order){
            console.log("Confirming Order...")
            return new Promise((resolve,reject)=>{
                
                let message = false;

                setTimeout(()=>{
                    if(message){
                        resolve({
                            ...order,
                            orderStatusKey:"Confirmed"
                        })
                    }else{
                        reject("order has not been confirmed")
                    }

                },5000)
            })
        }



        //  createOrder(cart).then((order)=>{

        //  }).then((order)=>{
        //     console.log("Payment Done",order)
        //     return updateInventory(order)
        //  }).then((order)=>{
        //     console.log("Inventory Updated",order)
        //     return orderStatus(order)
        //  }).then((order)=>{
        //     console.log("Confirmed order",order);

        //  }).catch(err=>console.log(err))


        async function ecommerce(){
           let order1 = await createOrder(cart)
           console.log(order1)
           let order2 = await makePayment(order1)
           console.log(order2)
           let order3 = await updateInventory(order2)
           console.log(order3)
           let order4 = await orderStatus(order3);
           console.log(order4)
        }

        ecommerce()

    </script>
    
</body>
</html>
