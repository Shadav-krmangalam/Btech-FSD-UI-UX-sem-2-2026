<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Async Weather Tracker</h1>

    <div id="search-box">
      <div id="first-search">
          <h3>Search City</h3>
        <form action="">
            <input type="text" name="" id="search-city" placeholder="Delhi,Mumbai etc...">
            <button type="submit">Search</button>
        </form>
      </div>
      <div id="search-history">
        <h3>Search History</h3>
        <div id="searched-cities-box">

        </div>
      </div>

    </div>

    <div id="weather-info-box">
        <h3>Weather Info</h3>
        <div id="fetched-data-box">

        </div>
    </div>





    <script>
        let API_KEY = "1a761d3bb408836cd1af3641ce1604c9";

        let URL = "https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric"
        let city = document.querySelector("#search-city")
        let form = document.querySelector("form")
        let weather = document.querySelector("#fetched-data-box")
        let searchedCity = document.querySelector("#searched-cities-box")



        async function getWeatherInfo(city){
          
         let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`)

       let data = await response.json()
    

       let card = document.createElement('div')
       card.innerHTML = `<div>City : ${data.name},${data.sys.country} </div>
                  <div>Temp : ${data.main.temp} deg</div>
                <div>Weather :${data.weather[0].main} </div>
                <div>Humidity : ${data.main.humidity}</div>
                <div>Wind : ${data.wind.speed}</div>`
        
    
        weather.innerHTML = ""
        weather.append(card)
        localStorage.setItem("cities",city.value)



        }

        searchedCity.innerHTML = `<h4>${localStorage.getItem("cities")}</h4>`

       
        form.addEventListener('submit',(e)=>{
            e.preventDefault()
            getWeatherInfo(city.value)

        })



    </script>
    
</body>
</html>
